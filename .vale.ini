# Vale Configuration for Academic Writing
# Target: Journal of Nanobiotechnology (BMC)
# Docs: https://vale.sh/docs/

StylesPath = styles

# Files to check
[*.{md,txt,tex}]
# Global styles
BasedOnStyles = Vale, Microsoft

# Minimum alert level: suggestion < warning < error
MinAlertLevel = suggestion

# Academic writing specific rules
[formats]
tex = latex
md = markdown

# Custom rules for biomedical academic writing
# Override Microsoft style for academic context
Microsoft.Contractions = NO           # Contractions not allowed in academic writing
Microsoft.HeadingPunctuation = NO
Microsoft.Headings = NO
Microsoft.Adverbs = suggestion
Microsoft.Passive = suggestion        # Flag passive voice as suggestion
Microsoft.We = suggestion             # Flag "we" usage
Microsoft.Wordiness = warning
Microsoft.FirstPerson = suggestion

# Vocabulary: accepted scientific terms
Vocab = styles/vocab/Acronyms
Vocab = styles/vocab/scientific-terms
